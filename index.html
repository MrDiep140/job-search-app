<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Search App</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Khung chứa chính cho toàn bộ biểu mẫu */
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 30px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hiệu ứng ẩn/hiện màn hình */
        .auth-box {
            width: 100%;
            display: none; /* Mặc định ẩn đi */
            flex-direction: column;
            align-items: center;
        }

        .auth-box.active {
            display: flex; /* Chỉ hiển thị màn hình nào có class .active */
        }

        /* Giao diện Logo hình số 8 */
        .logo-box {
            width: 110px;
            height: 110px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #e8f5e9;
            border-radius: 50%;
        }

        .logo-box svg {
            width: 55px;
            height: 55px;
        }

        .welcome-text {
            font-size: 16px;
            color: #2e7d32;
            font-weight: 600;
            margin-bottom: 12px;
            text-align: center;
        }

        h2 {
            font-size: 26px;
            font-weight: bold;
            color: #111111;
            margin-bottom: 32px;
        }

        /* Ô nhập liệu */
        .input-group {
            width: 100%;
            margin-bottom: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            outline: none;
            background-color: #f0f4f9; /* Màu nền xanh nhạt giống ảnh thực tế của bạn */
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #2e7d32;
            background-color: #ffffff;
        }

        /* Nút bấm chính */
        .btn-submit {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            background-color: #2e7d32;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 12px;
            margin-bottom: 24px;
        }

        .btn-submit:active {
            background-color: #1b5e20;
        }

        /* Dòng chữ chuyển đổi ở dưới cùng */
        .footer-text {
            font-size: 13px;
            color: #757575;
            text-align: center;
        }

        .footer-text span {
            color: #2e7d32;
            font-weight: 600;
            margin-left: 4px;
            cursor: pointer;
        }

        .footer-text span:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        
        <!-- Logo dùng chung cho cả 2 màn hình -->
        <div class="logo-box">
            <svg viewBox="0 0 100 100" xmlns="http://w3.org">
                <circle cx="50" cy="38" r="14" fill="none" stroke="#2e7d32" stroke-width="4"/>
                <circle cx="50" cy="62" r="14" fill="none" stroke="#2e7d32" stroke-width="4"/>
                <circle cx="50" cy="50" r="4" fill="#2e7d32"/>
            </svg>
        </div>

        <p class="welcome-text">Chào mừng bạn đến với JOB SEARCH APP</p>

        <!-- ================= MÀN HÌNH ĐĂNG NHẬP ================= -->
        <div id="login-box" class="auth-box active">
            <h2>Đăng nhập</h2>
            <div class="input-group">
                <input type="email" placeholder="Email" value="lehoangdiepspkt@gmail.com">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Mật khẩu" value="12345678">
            </div>
            <button class="btn-submit" type="button">Đăng nhập</button>
            <p class="footer-text">Chưa có tài khoản?<span id="go-to-register">Đăng ký</span></p>
        </div>

        <!-- ================= MÀN HÌNH ĐĂNG KÝ ================= -->
        <div id="register-box" class="auth-box">
            <h2>Đăng ký</h2>
            <div class="input-group">
                <input type="email" placeholder="Nhập Email của bạn">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Nhập Mật khẩu">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Xác nhận mật khẩu">
            </div>
            <button class="btn-submit" type="button">Đăng ký tài khoản</button>
            <p class="footer-text">Đã có tài khoản?<span id="go-to-login">Đăng nhập</span></p>
        </div>

    </div>

    <!-- Đoạn JavaScript xử lý hành động bấm nút chuyển đổi -->
    <script>
        const loginBox = document.getElementById('login-box');
        const registerBox = document.getElementById('register-box');
        const goToRegister = document.getElementById('go-to-register');
        const goToLogin = document.getElementById('go-to-login');

        // Khi bấm vào "Đăng ký" -> Ẩn Đăng nhập, Hiện Đăng ký
        goToRegister.addEventListener('click', () => {
            loginBox.classList.remove('active');
            registerBox.classList.add('active');
        });

        // Khi bấm vào "Đăng nhập" ở màn đăng ký -> Ngược lại
        goToLogin.addEventListener('click', () => {
            registerBox.classList.remove('active');
            loginBox.classList.add('active');
        });
    </script>

</body>
</html>
